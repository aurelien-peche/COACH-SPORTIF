<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Coach</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F4D3A">
<style>
:root{
  --field:#0F4D3A; --field-line:#1D6E52; --chalk:#F4F1EA; --chalk-dim:#D8D4C8;
  --ball:#D97757; --ball-dark:#A8552F; --ink:#12241C;
  --card:#FFFFFF; --card-alt:#F6F5F0; --muted:#6B7A72; --border:#E1DED4;
  --danger:#B4432E; --good:#1D6E52;
  --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--field);color:var(--chalk);min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:16px 16px 90px}
h1{font-family:Georgia,serif;font-weight:700;font-size:22px;letter-spacing:0.5px;margin:4px 0 2px}
.sub{color:var(--chalk-dim);font-size:13px;margin:0 0 16px}
.banner{display:flex;gap:10px;margin-bottom:18px}
.stat{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:12px 14px}
.stat .label{font-size:11px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:0.5px}
.stat .value{font-size:26px;font-weight:700;margin-top:2px;font-family:Georgia,serif}
.stat .value small{font-size:14px;font-weight:400;color:var(--chalk-dim)}
.alert{display:flex;gap:10px;align-items:center;background:rgba(217,119,87,0.18);border:1px solid var(--ball);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--chalk)}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tab{background:transparent;border:1px solid rgba(255,255,255,0.25);color:var(--chalk);padding:8px 14px;border-radius:999px;font-size:13px;white-space:nowrap;cursor:pointer}
.tab.active{background:var(--chalk);color:var(--field);border-color:var(--chalk);font-weight:700}
.view{display:none}
.view.active{display:block}
.day{background:var(--card);color:var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.day-name{font-weight:700;font-size:15px}
.day-date{font-size:12px;color:var(--muted)}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600}
.badge-weigh{background:#EEEDFE;color:#3C3489}
.section{margin-bottom:10px}
.check-row{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer}
.check-row input{width:18px;height:18px}
.check-row label{font-size:14px;font-weight:600;cursor:pointer}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.pill{border:1px solid var(--border);background:var(--card-alt);color:var(--ink);font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer}
.pill.sel{background:var(--good);border-color:var(--good);color:white;font-weight:600}
.subcheck{display:flex;gap:14px;margin:6px 0}
.subcheck label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer}
.meal-opts{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.meal-opt{border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.meal-opt.sel{border-color:var(--ball);background:#FCEFE9}
.meal-opt .name{font-weight:600}
.meal-opt .time{font-size:11px;color:var(--muted)}
.session-box{background:var(--card-alt);border-radius:10px;padding:10px 12px;margin:8px 0}
.session-box .title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.session-box .name{font-weight:700;font-size:13px}
.level{font-size:10px;padding:2px 7px;border-radius:999px;background:#FAEEDA;color:#633806;font-weight:600}
.exo{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px solid var(--border)}
.exo:first-of-type{border-top:none}
.exo svg{width:38px;height:38px;flex-shrink:0}
.exo .exo-name{font-size:12.5px;font-weight:600}
.exo .exo-reps{font-size:11px;color:var(--muted)}
button.ghost{width:100%;background:transparent;border:1px solid var(--border);color:var(--ink);padding:8px;border-radius:8px;font-size:12.5px;margin-top:6px;cursor:pointer}
.scale{display:flex;gap:4px;margin:8px 0 6px}
.scale div{flex:1;text-align:center;font-size:12px;padding:6px 0;border:1px solid var(--border);border-radius:8px;cursor:pointer}
.scale div.sel{background:var(--good);color:white;border-color:var(--good);font-weight:700}
.difficulty-btns{display:flex;gap:8px}
.difficulty-btns button{flex:1;font-size:11.5px;padding:7px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer}
.cardio-inputs{display:flex;gap:8px;margin:8px 0}
.cardio-inputs div{flex:1}
.cardio-inputs label{font-size:10.5px;color:var(--muted)}
.cardio-inputs input{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px}
.speed-out{background:var(--card-alt);border-radius:10px;padding:8px;text-align:center;margin:8px 0}
.speed-out .v{font-size:16px;font-weight:700}
.speed-out .l{font-size:10px;color:var(--muted)}
.weigh-inputs{display:flex;gap:8px}
.weigh-inputs div{flex:1;background:var(--card-alt);border-radius:10px;padding:8px}
.weigh-inputs label{font-size:10.5px;color:var(--muted)}
.weigh-inputs input{width:100%;border:none;background:transparent;font-size:15px;font-weight:700;padding-top:2px}
.card{background:var(--card);color:var(--ink);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:14px}
.shop-item{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);font-size:13px}
.shop-item:first-of-type{border-top:none}
.shop-cat{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:0.4px;margin:12px 0 4px}
.hist-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);font-size:12.5px}
.hist-row:first-of-type{border-top:none}
.empty{font-size:13px;color:var(--muted);text-align:center;padding:20px 0}
.chart-wrap{position:relative;height:180px}
canvas{width:100%!important;height:100%!important}
.small-note{font-size:11.5px;color:var(--muted);margin-top:6px}
.no-slot{font-size:12.5px;color:var(--muted);padding:4px 0}
</style>
</head>
<body>
<div class="wrap">
  <h1>Coach</h1>
  <p class="sub">Ton agenda sport et repas, semaine du <span id="weekLabel"></span></p>

  <div class="banner">
    <div class="stat">
      <div class="label">Poids actuel</div>
      <div class="value" id="statWeight">— <small>kg</small></div>
    </div>
    <div class="stat">
      <div class="label">Séances cette semaine</div>
      <div class="value" id="statSessions">0<small> / — </small></div>
    </div>
  </div>

  <div id="reminderBanner"></div>

  <div class="tabs">
    <button class="tab active" data-tab="agenda">Agenda</button>
    <button class="tab" data-tab="courses">Liste de courses</button>
    <button class="tab" data-tab="suivi">Poids &amp; analyse</button>
    <button class="tab" data-tab="historique">Historique</button>
  </div>

  <div class="view active" id="view-agenda"></div>
  <div class="view" id="view-courses"></div>
  <div class="view" id="view-suivi"></div>
  <div class="view" id="view-historique"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ---------- Data ---------- */
const DAY_NAMES = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];

const EXO_SVGS = {
  squat: `<svg viewBox="0 0 40 40"><circle cx="20" cy="9" r="4" fill="#0F6E56"/><path d="M20 13 L20 22 M20 22 L13 30 M20 22 L27 30 M13 17 L20 22 L27 17" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  lunge: `<svg viewBox="0 0 40 40"><circle cx="16" cy="8" r="4" fill="#0F6E56"/><path d="M16 12 L18 20 M18 20 L12 32 M18 20 L27 26 M13 16 L27 12" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  pushup: `<svg viewBox="0 0 40 40"><circle cx="9" cy="24" r="4" fill="#0F6E56"/><path d="M13 25 L30 15 M13 25 L11 32 M18 22 L16 30" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  plank: `<svg viewBox="0 0 40 40"><circle cx="8" cy="22" r="4" fill="#0F6E56"/><path d="M12 23 L32 18 M12 23 L10 31 M20 21 L19 30" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  mountain: `<svg viewBox="0 0 40 40"><circle cx="10" cy="20" r="4" fill="#0F6E56"/><path d="M14 21 L30 24 M14 21 L20 30 M25 22 L18 15" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  burpee: `<svg viewBox="0 0 40 40"><circle cx="20" cy="8" r="4" fill="#0F6E56"/><path d="M20 12 L20 20 M20 20 L14 28 M20 20 L26 28 M12 14 L20 20 L28 14" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  gainage_lateral: `<svg viewBox="0 0 40 40"><circle cx="9" cy="16" r="4" fill="#0F6E56"/><path d="M12 18 L30 24 M12 18 L14 30 M22 21 L26 12" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  chaise: `<svg viewBox="0 0 40 40"><circle cx="20" cy="9" r="4" fill="#0F6E56"/><path d="M20 13 L20 21 M20 21 L13 28 M20 21 L27 28 M13 21 L27 21" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`
};

const EXO_LIB = {
  squat: {name:"Squats", svg:"squat"},
  lunge: {name:"Fentes alternées", svg:"lunge"},
  pushup: {name:"Pompes (genoux si besoin)", svg:"pushup"},
  plank: {name:"Gainage planche", svg:"plank"},
  mountain: {name:"Mountain climbers", svg:"mountain"},
  burpee: {name:"Burpees", svg:"burpee"},
  gainage_lateral: {name:"Gainage latéral", svg:"gainage_lateral"},
  chaise: {name:"Chaise contre le mur", svg:"chaise"}
};

// Fitness sessions by level (1-4), pick roughly matching declared duration
const FITNESS_SESSIONS = [
  {level:1, minMin:10, name:"Réveil musculaire", exos:[["squat","2 x 10"],["plank","2 x 20 sec"],["pushup","2 x 6"]]},
  {level:1, minMin:20, name:"Bases du corps entier", exos:[["squat","3 x 10"],["lunge","2 x 8 / jambe"],["plank","3 x 20 sec"],["pushup","2 x 8"]]},
  {level:2, minMin:20, name:"Renfo bas du corps + gainage", exos:[["squat","3 x 12"],["lunge","3 x 10 / jambe"],["pushup","3 x 8"],["plank","3 x 30 sec"],["mountain","3 x 20"]]},
  {level:2, minMin:30, name:"Circuit complet niveau 2", exos:[["squat","4 x 12"],["lunge","3 x 10 / jambe"],["pushup","3 x 10"],["gainage_lateral","2 x 25 sec / côté"],["mountain","3 x 25"]]},
  {level:3, minMin:30, name:"Circuit intensif", exos:[["squat","4 x 15"],["lunge","4 x 12 / jambe"],["pushup","4 x 12"],["burpee","3 x 8"],["plank","3 x 45 sec"]]},
  {level:3, minMin:45, name:"Corps entier renforcé", exos:[["squat","5 x 15"],["lunge","4 x 12 / jambe"],["pushup","4 x 12"],["burpee","4 x 8"],["gainage_lateral","3 x 30 sec / côté"],["mountain","4 x 25"]]},
  {level:4, minMin:30, name:"Haute intensité", exos:[["burpee","5 x 10"],["squat","5 x 18"],["pushup","5 x 14"],["mountain","4 x 30"],["plank","4 x 50 sec"]]},
  {level:4, minMin:60, name:"Séance longue avancée", exos:[["squat","6 x 18"],["lunge","5 x 14 / jambe"],["pushup","5 x 15"],["burpee","5 x 10"],["gainage_lateral","4 x 35 sec / côté"],["chaise","3 x 45 sec"]]}
];

const MEALS = {
  dejeuner: [
    {name:"Bowl thaï poulet-cacahuète", time:"15 min", ing:["Blanc de poulet","Cacahuètes","Carotte","Sauce soja","Riz","Citron vert"]},
    {name:"Salade taboulé au thon", time:"10 min", ing:["Semoule","Thon en boîte","Tomate","Concombre","Persil","Citron"]},
    {name:"Poêlée pois chiches épinards", time:"12 min", ing:["Pois chiches","Épinards frais","Ail","Cumin","Huile d'olive"]},
    {name:"Wrap poulet crudités", time:"10 min", ing:["Tortilla","Blanc de poulet","Salade","Tomate","Sauce yaourt"]},
    {name:"Buddha bowl saumon", time:"18 min", ing:["Pavé de saumon","Quinoa","Avocat","Edamame","Sauce soja"]},
    {name:"Curry de lentilles express", time:"20 min", ing:["Lentilles corail","Lait de coco","Curry en poudre","Oignon","Riz"]},
    {name:"Salade grecque + œuf", time:"8 min", ing:["Tomate","Concombre","Feta","Olives","Œufs"]},
    {name:"Riz sauté légumes-crevettes", time:"15 min", ing:["Riz cuit","Crevettes","Petits pois","Carotte","Sauce soja","Œuf"]}
  ],
  diner: [
    {name:"Papillote de poisson vapeur", time:"20 min", ing:["Filet de poisson blanc","Courgette","Citron","Aneth"]},
    {name:"Omelette champignons", time:"10 min", ing:["Œufs","Champignons","Persil"]},
    {name:"Soupe miso tofu", time:"12 min", ing:["Pâte miso","Tofu","Algue wakamé","Oignon nouveau"]},
    {name:"Poulet grillé haricots verts", time:"20 min", ing:["Blanc de poulet","Haricots verts","Ail","Huile d'olive"]},
    {name:"Chili sin carne rapide", time:"18 min", ing:["Haricots rouges","Maïs","Tomates concassées","Cumin","Oignon"]},
    {name:"Salade de pâtes légères", time:"12 min", ing:["Pâtes semi-complètes","Tomates cerises","Mozzarella","Basilic"]},
    {name:"Poke bowl tofu", time:"15 min", ing:["Tofu fumé","Riz vinaigré","Edamame","Concombre","Sauce soja"]},
    {name:"Velouté de légumes + œuf mollet", time:"15 min", ing:["Légumes de saison","Bouillon","Œufs"]}
  ]
};

/* ---------- State ---------- */
let state = {
  weight: null,
  waist: null,
  weekPlan: {}, // key: dayKey -> {sport:{active,duration,type,session,rating,harder}, meals:{dejeuner:{active,choice}, diner:{...}}}
  history: [], // completed items log
  weighIns: [], // {date, weight, waist}
  shoppingChecked: {}
};

function dayKey(offset){
  const d = new Date();
  d.setDate(d.getDate()+offset);
  return d.toISOString().slice(0,10);
}
function fmtDate(offset){
  const d = new Date();
  d.setDate(d.getDate()+offset);
  return {name: DAY_NAMES[d.getDay()], num: d.getDate(), key: dayKey(offset), isMonday: d.getDay()===1};
}

async function loadState(){
  try{
    const r = await window.storage.get('coach-state');
    if(r && r.value) state = JSON.parse(r.value);
  }catch(e){ /* first run, no data yet */ }
}
async function saveState(){
  try{ await window.storage.set('coach-state', JSON.stringify(state)); }
  catch(e){ console.error('Erreur de sauvegarde', e); }
}

function ensureDay(key){
  if(!state.weekPlan[key]){
    state.weekPlan[key] = {
      sport: {active:false, duration:null, type:null, session:null, rating:null, harder:null, logged:false},
      meals: {
        dejeuner: {active:false, choice:null},
        diner: {active:false, choice:null}
      }
    };
  }
  return state.weekPlan[key];
}

function pickFitnessSession(duration, level){
  const candidates = FITNESS_SESSIONS.filter(s=>s.level===level);
  let best = candidates.filter(s=>s.minMin<=duration).sort((a,b)=>b.minMin-a.minMin)[0];
  if(!best) best = candidates.sort((a,b)=>a.minMin-b.minMin)[0];
  return best;
}

function currentLevel(){
  // derive from history: count "harder" votes on fitness sessions
  const harderVotes = state.history.filter(h=>h.type==='fitness' && h.harder===true).length;
  return Math.min(4, 1 + Math.floor(harderVotes/2));
}

/* ---------- Rendering ---------- */
function renderBanner(){
  const lastWeigh = state.weighIns[state.weighIns.length-1];
  document.getElementById('statWeight').innerHTML = lastWeigh ? `${lastWeigh.weight} <small>kg</small>` : `— <small>kg</small>`;
  const weekKeys = [0,1,2,3,4,5,6].map(dayKey);
  const declared = weekKeys.filter(k=>state.weekPlan[k] && state.weekPlan[k].sport.active).length;
  const done = weekKeys.filter(k=>state.weekPlan[k] && state.weekPlan[k].sport.active && state.weekPlan[k].sport.logged).length;
  document.getElementById('statSessions').innerHTML = `${done}<small> / ${declared||'—'}</small>`;

  const today = new Date(); today.setHours(0,0,0,0);
  let missed = null;
  for(let off=-1; off>=-3; off--){
    const d = new Date(); d.setDate(d.getDate()+off);
    const k = dayKey(off);
    const plan = state.weekPlan[k];
    const needsInput = plan && ((plan.sport.active && !plan.sport.logged) || plan.meals.dejeuner.active && !plan.meals.dejeuner.choice || plan.meals.diner.active && !plan.meals.diner.choice);
    if(needsInput){ missed = DAY_NAMES[d.getDay()]; break; }
  }
  const banner = document.getElementById('reminderBanner');
  banner.innerHTML = missed ? `<div class="alert">⚠ ${missed} n'est pas complètement renseigné — mets à jour avant que la semaine avance.</div>` : '';
}

function renderExo(code, reps){
  const exo = EXO_LIB[code];
  return `<div class="exo">${EXO_SVGS[exo.svg]}<div><div class="exo-name">${exo.name}</div><div class="exo-reps">${reps}</div></div></div>`;
}

function renderDay(offset){
  const {name, num, key, isMonday} = fmtDate(offset);
  const plan = ensureDay(key);
  const s = plan.sport;

  let html = `<div class="day" data-key="${key}">`;
  html += `<div class="day-head"><div><span class="day-name">${name} ${num}</span></div>`;
  if(isMonday) html += `<span class="badge badge-weigh">Pesée</span>`;
  html += `</div>`;

  if(isMonday){
    const already = state.weighIns.find(w=>w.date===key);
    html += `<div class="weigh-inputs">
      <div><label>Poids (kg)</label><input type="number" step="0.1" class="weighInput" data-key="${key}" data-field="weight" value="${already?already.weight:''}" placeholder="72.5"></div>
      <div><label>Tour de ventre — optionnel (cm)</label><input type="number" class="weighInput" data-key="${key}" data-field="waist" value="${already?already.waist||'':''}" placeholder="88"></div>
    </div>`;
  }

  // Sport section
  html += `<div class="section">
    <div class="check-row"><input type="checkbox" class="sportCheck" data-key="${key}" ${s.active?'checked':''}><label>Sport</label></div>`;
  if(s.active){
    html += `<div class="pill-row">`;
    [10,20,30,40,50,60].forEach(d=>{
      html += `<div class="pill ${s.duration===d?'sel':''}" data-key="${key}" data-dur="${d}">${d} min</div>`;
    });
    html += `</div>`;
    if(!s.type){
      html += `<div class="pill-row">
        <div class="pill typePill" data-key="${key}" data-type="fitness">Fitness</div>
        <div class="pill typePill" data-key="${key}" data-type="course">Course à pied</div>
        <div class="pill typePill" data-key="${key}" data-type="velo">Vélo</div>
      </div>`;
    } else if(s.type==='fitness'){
      let sess = s.session;
      if(!sess && s.duration){
        sess = pickFitnessSession(s.duration, currentLevel());
        s.session = sess;
      }
      if(sess){
        html += `<div class="session-box">
          <div class="title-row"><span class="name">${sess.name}</span><span class="level">Niveau ${sess.level}</span></div>
          ${sess.exos.map(([c,r])=>renderExo(c,r)).join('')}
        </div>
        <button class="ghost changeBtn" data-key="${key}">Changer la séance</button>`;
        if(!s.logged){
          html += `<div class="small-note">Après la séance</div>
          <div class="scale">
            ${[1,2,3,4,5].map(n=>`<div class="rateBtn ${s.rating===n?'sel':''}" data-key="${key}" data-rate="${n}">${n}</div>`).join('')}
          </div>
          <div class="difficulty-btns">
            <button class="harderBtn" data-key="${key}" data-harder="false">Pareil la prochaine fois</button>
            <button class="harderBtn" data-key="${key}" data-harder="true">Plus dur la prochaine fois</button>
          </div>`;
        } else {
          html += `<div class="small-note">Séance loggée — ressenti ${s.rating}/5${s.harder?', tu passes plus dur':''}.</div>`;
        }
      } else {
        html += `<div class="no-slot">Choisis une durée pour voir la séance proposée.</div>`;
      }
    } else if(s.type==='course' || s.type==='velo'){
      html += `<div class="cardio-inputs">
        <div><label>Distance (km)</label><input type="number" step="0.1" class="cardioInput" data-key="${key}" data-field="dist" value="${s.dist||''}"></div>
        <div><label>Temps (min)</label><input type="number" class="cardioInput" data-key="${key}" data-field="time" value="${s.time||''}"></div>
      </div>`;
      if(s.dist && s.time){
        const speed = (s.dist/(s.time/60)).toFixed(1);
        const prev = state.history.filter(h=>h.type===s.type).slice(-1)[0];
        const diff = prev ? (speed - prev.speed).toFixed(1) : null;
        html += `<div class="speed-out"><div class="v">${speed} km/h</div><div class="l">Vitesse moyenne</div></div>`;
        if(diff!==null) html += `<div class="small-note">Vs séance précédente : ${diff>=0?'+':''}${diff} km/h</div>`;
        if(!s.logged) html += `<button class="ghost logCardio" data-key="${key}">Enregistrer la séance</button>`;
        else html += `<div class="small-note">Séance enregistrée.</div>`;
      }
      html += `<button class="ghost changeTypeBtn" data-key="${key}" style="margin-top:8px">Changer le type de sport</button>`;
    }
  }
  html += `</div>`;

  // Meals section
  html += `<div class="section" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px">
    <div class="subcheck">
      <label><input type="checkbox" class="mealCheck" data-key="${key}" data-meal="dejeuner" ${plan.meals.dejeuner.active?'checked':''}> Déjeuner</label>
      <label><input type="checkbox" class="mealCheck" data-key="${key}" data-meal="diner" ${plan.meals.diner.active?'checked':''}> Dîner</label>
    </div>`;
  ['dejeuner','diner'].forEach(m=>{
    const mp = plan.meals[m];
    if(mp.active){
      let opts = mp.options;
      if(!opts){
        opts = pickMealOptions(m);
        mp.options = opts;
      }
      html += `<div class="small-note" style="margin-top:6px;text-transform:capitalize">${m} — choisis une option</div>
      <div class="meal-opts">`;
      opts.forEach((o,i)=>{
        html += `<div class="meal-opt ${mp.choice===i?'sel':''}" data-key="${key}" data-meal="${m}" data-idx="${i}">
          <span class="name">${o.name}</span><span class="time">${o.time}</span>
        </div>`;
      });
      html += `</div>`;
    }
  });
  html += `</div>`;

  html += `</div>`;
  return html;
}

function pickMealOptions(mealType){
  const pool = [...MEALS[mealType]];
  const chosen = [];
  while(chosen.length<3 && pool.length){
    const i = Math.floor(Math.random()*pool.length);
    chosen.push(pool.splice(i,1)[0]);
  }
  return chosen;
}

function renderAgenda(){
  document.getElementById('weekLabel').textContent = new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'long'});
  let html = '';
  for(let i=0;i<7;i++) html += renderDay(i);
  document.getElementById('view-agenda').innerHTML = html;
}

function renderCourses(){
  const items = {};
  Object.values(state.weekPlan).forEach(plan=>{
    ['dejeuner','diner'].forEach(m=>{
      const mp = plan.meals[m];
      if(mp.active && mp.choice!==null && mp.options){
        const meal = mp.options[mp.choice];
        meal.ing.forEach(ing=>{ items[ing] = true; });
      }
    });
  });
  const list = Object.keys(items).sort();
  const el = document.getElementById('view-courses');
  if(!list.length){
    el.innerHTML = `<div class="card"><div class="empty">Choisis des repas dans l'agenda pour remplir ta liste de courses.</div></div>`;
    return;
  }
  let html = `<div class="card"><h3>Liste de courses de la semaine</h3>`;
  list.forEach(ing=>{
    const checked = state.shoppingChecked[ing];
    html += `<div class="shop-item"><label style="display:flex;gap:8px;align-items:center;width:100%;cursor:pointer">
      <input type="checkbox" class="shopCheck" data-item="${ing}" ${checked?'checked':''}>
      <span style="${checked?'text-decoration:line-through;color:var(--muted)':''}">${ing}</span>
    </label></div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function renderSuivi(){
  const el = document.getElementById('view-suivi');
  if(!state.weighIns.length){
    el.innerHTML = `<div class="card"><div class="empty">Ta première pesée du lundi apparaîtra ici, avec la courbe d'évolution.</div></div>`;
    return;
  }
  let html = `<div class="card"><h3>Évolution du poids</h3><div class="chart-wrap"><canvas id="weightChart"></canvas></div></div>`;

  // analysis sessions vs weight
  if(state.weighIns.length>=2){
    const weeks = [];
    for(let i=1;i<state.weighIns.length;i++){
      const prev = state.weighIns[i-1], cur = state.weighIns[i];
      const sessionsInWeek = state.history.filter(h=>h.date>prev.date && h.date<=cur.date).length;
      weeks.push({delta: cur.weight-prev.weight, sessions: sessionsInWeek});
    }
    const withSport = weeks.filter(w=>w.sessions>=3);
    const withoutSport = weeks.filter(w=>w.sessions<3);
    html += `<div class="card"><h3>Séances vs poids</h3>`;
    if(weeks.length<3){
      html += `<div class="empty">Encore un peu tôt pour une vraie analyse — reviens dans quelques semaines, plus t'as de pesées, plus c'est parlant.</div>`;
    } else {
      const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b.delta,0)/arr.length).toFixed(2) : null;
      const a1 = avg(withSport), a2 = avg(withoutSport);
      html += `<div class="hist-row"><span>Semaines à 3 séances ou plus</span><span>${a1!==null?a1+' kg en moyenne':'pas assez de données'}</span></div>`;
      html += `<div class="hist-row"><span>Semaines à moins de 3 séances</span><span>${a2!==null?a2+' kg en moyenne':'pas assez de données'}</span></div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;

  const ctx = document.getElementById('weightChart');
  new Chart(ctx, {
    type:'line',
    data:{
      labels: state.weighIns.map(w=>new Date(w.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})),
      datasets:[{label:'Poids (kg)', data: state.weighIns.map(w=>w.weight), borderColor:'#0F6E56', backgroundColor:'rgba(15,110,86,0.1)', tension:0.3, fill:true}]
    },
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{ticks:{color:'#6B7A72'}}, x:{ticks:{color:'#6B7A72'}}}}
  });
}

function renderHistorique(){
  const el = document.getElementById('view-historique');
  if(!state.history.length){
    el.innerHTML = `<div class="card"><div class="empty">Tes séances loggées apparaîtront ici.</div></div>`;
    return;
  }
  let html = `<div class="card"><h3>Séances loggées</h3>`;
  [...state.history].reverse().forEach(h=>{
    const d = new Date(h.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
    let detail = '';
    if(h.type==='fitness') detail = `${h.name} — ressenti ${h.rating}/5${h.harder?' — plus dur demandé':''}`;
    else detail = `${h.dist} km en ${h.time} min — ${h.speed} km/h`;
    html += `<div class="hist-row"><span>${d} · ${h.type}</span><span>${detail}</span></div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function renderAll(){
  renderBanner();
  renderAgenda();
  renderCourses();
  renderSuivi();
  renderHistorique();
  attachHandlers();
}

/* ---------- Event handling (delegated, re-attached after render) ---------- */
function attachHandlers(){
  document.querySelectorAll('.sportCheck').forEach(el=>{
    el.onchange = e=>{
      const plan = ensureDay(e.target.dataset.key);
      plan.sport.active = e.target.checked;
      if(!e.target.checked){ plan.sport.duration=null; plan.sport.type=null; plan.sport.session=null; }
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.pill[data-dur]').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      plan.sport.duration = parseInt(el.dataset.dur);
      plan.sport.session = null;
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.typePill').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      plan.sport.type = el.dataset.type;
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.changeTypeBtn').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      plan.sport.type = null; plan.sport.dist=null; plan.sport.time=null; plan.sport.logged=false;
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.changeBtn').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      const s = plan.sport;
      const others = FITNESS_SESSIONS.filter(f=>f.level===currentLevel() && f.name!==(s.session&&s.session.name));
      s.session = others.length ? others[Math.floor(Math.random()*others.length)] : pickFitnessSession(s.duration, currentLevel());
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.rateBtn').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      plan.sport.rating = parseInt(el.dataset.rate);
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.harderBtn').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      const s = plan.sport;
      s.harder = el.dataset.harder === 'true';
      s.logged = true;
      state.history.push({date:el.dataset.key, type:'fitness', name:s.session.name, rating:s.rating, harder:s.harder});
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.cardioInput').forEach(el=>{
    el.oninput = ()=>{
      const plan = ensureDay(el.dataset.key);
      plan.sport[el.dataset.field] = parseFloat(el.value)||null;
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.logCardio').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      const s = plan.sport;
      const speed = +(s.dist/(s.time/60)).toFixed(1);
      s.logged = true; s.speed = speed;
      state.history.push({date:el.dataset.key, type:s.type, dist:s.dist, time:s.time, speed});
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.mealCheck').forEach(el=>{
    el.onchange = e=>{
      const plan = ensureDay(e.target.dataset.key);
      const mp = plan.meals[e.target.dataset.meal];
      mp.active = e.target.checked;
      if(!e.target.checked){ mp.options=null; mp.choice=null; }
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.meal-opt').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      plan.meals[el.dataset.meal].choice = parseInt(el.dataset.idx);
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.weighInput').forEach(el=>{
    el.onchange = ()=>{
      const key = el.dataset.key;
      let entry = state.weighIns.find(w=>w.date===key);
      if(!entry){ entry = {date:key, weight:null, waist:null}; state.weighIns.push(entry); state.weighIns.sort((a,b)=>a.date.localeCompare(b.date)); }
      entry[el.dataset.field] = parseFloat(el.value)||null;
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.shopCheck').forEach(el=>{
    el.onchange = ()=>{
      state.shoppingChecked[el.dataset.item] = el.checked;
      saveState(); renderCourses();
    };
  });
  document.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('view-'+el.dataset.tab).classList.add('active');
    };
  });
}

(async function init(){
  await loadState();
  renderAll();
})();
</script>
</body>
</html>
