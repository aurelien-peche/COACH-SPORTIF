<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Coach</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0F4D3A">
<style>
:root{
  --field:#0F4D3A; --field-line:#1D6E52; --chalk:#F4F1EA; --chalk-dim:#D8D4C8;
  --ball:#D97757; --ball-dark:#A8552F; --ink:#12241C;
  --card:#FFFFFF; --card-alt:#F6F5F0; --muted:#6B7A72; --border:#E1DED4;
  --danger:#B4432E; --good:#1D6E52;
  --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--field);color:var(--chalk);min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding:16px 16px 90px}
h1{font-family:Georgia,serif;font-weight:700;font-size:22px;letter-spacing:0.5px;margin:4px 0 2px}
.sub{color:var(--chalk-dim);font-size:13px;margin:0 0 16px}
.banner{display:flex;gap:10px;margin-bottom:18px}
.stat{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);padding:12px 14px}
.stat .label{font-size:11px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:0.5px}
.stat .value{font-size:24px;font-weight:700;margin-top:2px;font-family:Georgia,serif}
.stat .value small{font-size:13px;font-weight:400;color:var(--chalk-dim)}
.alert{display:flex;gap:10px;align-items:center;background:rgba(217,119,87,0.18);border:1px solid var(--ball);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--chalk)}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto}
.tab{background:transparent;border:1px solid rgba(255,255,255,0.25);color:var(--chalk);padding:8px 14px;border-radius:999px;font-size:13px;white-space:nowrap;cursor:pointer}
.tab.active{background:var(--chalk);color:var(--field);border-color:var(--chalk);font-weight:700}
.view{display:none}
.view.active{display:block}
.day{background:var(--card);color:var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.day-name{font-weight:700;font-size:15px}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600}
.badge-weigh{background:#EEEDFE;color:#3C3489}
.block-title{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:700;margin:12px 0 8px}
.block-title:first-of-type{margin-top:0}
.weigh-inputs{display:flex;gap:8px;margin-bottom:10px}
.weigh-inputs div{flex:1;background:var(--card-alt);border-radius:10px;padding:8px}
.weigh-inputs label{font-size:10.5px;color:var(--muted)}
.weigh-inputs input{width:100%;border:none;background:transparent;font-size:15px;font-weight:700;padding-top:2px}
.imc-tag{font-size:11px;color:var(--muted);margin-top:-4px;margin-bottom:8px}

.sport-entry{background:var(--card-alt);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.sport-entry .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sport-entry .kind{font-size:13px;font-weight:700}
.sport-entry .dur{font-size:11px;color:var(--muted)}
.sport-entry .status{font-size:12px;color:var(--good)}
.sport-entry .status.pending{color:var(--muted)}
.add-sport-btn{width:100%;border:1px dashed var(--border);background:transparent;padding:9px;border-radius:8px;font-size:12.5px;cursor:pointer;margin-bottom:6px;color:var(--ink)}
.add-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.add-picker .pill{border:1px solid var(--border);background:white;font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer}

.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.pill{border:1px solid var(--border);background:var(--card-alt);color:var(--ink);font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer}
.pill.sel{background:var(--good);border-color:var(--good);color:white;font-weight:600}

.session-box{background:white;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:8px 0}
.session-box .title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.session-box .name{font-weight:700;font-size:13px}
.level{font-size:10px;padding:2px 7px;border-radius:999px;background:#FAEEDA;color:#633806;font-weight:600}
.exo{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px solid var(--border)}
.exo:first-of-type{border-top:none}
.exo svg{width:40px;height:40px;flex-shrink:0}
.exo .exo-name{font-size:12.5px;font-weight:700}
.exo .exo-reps{font-size:11px;color:var(--muted);margin-bottom:2px}
.exo .exo-steps{font-size:11px;color:var(--muted);line-height:1.4}
button.ghost{background:transparent;border:1px solid var(--border);color:var(--ink);padding:8px;border-radius:8px;font-size:12.5px;margin-top:6px;cursor:pointer}
button.ghost.full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row button{flex:1;font-size:12px;padding:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer}
.btn-row button.primary{background:var(--good);color:white;border-color:var(--good);font-weight:600}

.chrono-box{background:var(--card-alt);border-radius:10px;padding:14px;text-align:center;margin:8px 0}
.chrono-box .time{font-size:30px;font-weight:700;font-family:Georgia,serif}
.chrono-box .cur-exo{font-size:12.5px;color:var(--muted);margin-top:4px}

.scale{display:flex;gap:4px;margin:8px 0 6px}
.scale div{flex:1;text-align:center;font-size:12px;padding:6px 0;border:1px solid var(--border);border-radius:8px;cursor:pointer}
.scale div.sel{background:var(--good);color:white;border-color:var(--good);font-weight:700}
.stars{display:flex;gap:4px;margin:6px 0}
.stars span{font-size:22px;cursor:pointer;color:var(--border)}
.stars span.on{color:var(--ball)}
.cardio-inputs{display:flex;gap:8px;margin:8px 0}
.cardio-inputs div{flex:1}
.cardio-inputs label{font-size:10.5px;color:var(--muted)}
.cardio-inputs input{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px}
.speed-out{background:white;border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center;margin:8px 0}
.speed-out .v{font-size:16px;font-weight:700}
.speed-out .l{font-size:10px;color:var(--muted)}

.meal-block{background:var(--card-alt);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.meal-block .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.meal-block .head span.name{font-size:13px;font-weight:700}
.meal-mode-btns{display:flex;gap:6px}
.meal-mode-btns button{flex:1;font-size:12px;padding:7px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer}
.meal-opts{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.meal-opt{border:1px solid var(--border);background:white;border-radius:10px;padding:8px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.meal-opt.sel{border-color:var(--ball);background:#FCEFE9}
.meal-opt .name{font-weight:600}
.meal-opt .stars-disp{color:var(--ball);font-size:12px;white-space:nowrap}
.done-tag{font-size:12px;color:var(--good);display:flex;align-items:center;gap:6px}

.card{background:var(--card);color:var(--ink);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:14px}
.shop-item{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);font-size:13px}
.shop-item:first-of-type{border-top:none}
.hist-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);font-size:12.5px}
.hist-row:first-of-type{border-top:none}
.empty{font-size:13px;color:var(--muted);text-align:center;padding:20px 0}
.chart-wrap{position:relative;height:180px}
canvas{width:100%!important;height:100%!important}
.small-note{font-size:11.5px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Coach</h1>
  <p class="sub">Ton agenda sport et repas, semaine du <span id="weekLabel"></span></p>

  <div class="banner">
    <div class="stat">
      <div class="label">Poids</div>
      <div class="value" id="statWeight">— <small>kg</small></div>
      <div class="small-note" id="statImc"></div>
    </div>
    <div class="stat">
      <div class="label">Séances cette semaine</div>
      <div class="value" id="statSessions">0</div>
    </div>
  </div>

  <div id="reminderBanner"></div>

  <div class="tabs">
    <button class="tab active" data-tab="agenda">Agenda</button>
    <button class="tab" data-tab="courses">Liste de courses</button>
    <button class="tab" data-tab="suivi">Poids &amp; analyse</button>
    <button class="tab" data-tab="historique">Historique</button>
  </div>

  <div class="view active" id="view-agenda"></div>
  <div class="view" id="view-courses"></div>
  <div class="view" id="view-suivi"></div>
  <div class="view" id="view-historique"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ---------- Constantes ---------- */
const HEIGHT_M = 1.88;
const DAY_NAMES = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const SPORT_LABELS = {fitness:"Fitness", course:"Course à pied", velo:"Vélo", tennis:"Tennis", foot:"Foot"};

const EXO_SVGS = {
  squat: `<svg viewBox="0 0 40 40"><circle cx="20" cy="9" r="4" fill="#0F6E56"/><path d="M20 13 L20 22 M20 22 L13 30 M20 22 L27 30 M13 17 L20 22 L27 17" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  lunge: `<svg viewBox="0 0 40 40"><circle cx="16" cy="8" r="4" fill="#0F6E56"/><path d="M16 12 L18 20 M18 20 L12 32 M18 20 L27 26 M13 16 L27 12" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  pushup: `<svg viewBox="0 0 40 40"><circle cx="9" cy="24" r="4" fill="#0F6E56"/><path d="M13 25 L30 15 M13 25 L11 32 M18 22 L16 30" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  plank: `<svg viewBox="0 0 40 40"><circle cx="8" cy="22" r="4" fill="#0F6E56"/><path d="M12 23 L32 18 M12 23 L10 31 M20 21 L19 30" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  mountain: `<svg viewBox="0 0 40 40"><circle cx="10" cy="20" r="4" fill="#0F6E56"/><path d="M14 21 L30 24 M14 21 L20 30 M25 22 L18 15" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  burpee: `<svg viewBox="0 0 40 40"><circle cx="20" cy="8" r="4" fill="#0F6E56"/><path d="M20 12 L20 20 M20 20 L14 28 M20 20 L26 28 M12 14 L20 20 L28 14" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  gainage_lateral: `<svg viewBox="0 0 40 40"><circle cx="9" cy="16" r="4" fill="#0F6E56"/><path d="M12 18 L30 24 M12 18 L14 30 M22 21 L26 12" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  chaise: `<svg viewBox="0 0 40 40"><circle cx="20" cy="9" r="4" fill="#0F6E56"/><path d="M20 13 L20 21 M20 21 L13 28 M20 21 L27 28 M13 21 L27 21" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`
};

const EXO_LIB = {
  squat: {name:"Squats", svg:"squat", steps:"Pieds largeur épaules · descends comme pour t'asseoir, dos droit · remonte en poussant sur les talons"},
  lunge: {name:"Fentes alternées", svg:"lunge", steps:"Grand pas en avant · descends jusqu'à 90° aux deux genoux · reviens et change de jambe"},
  pushup: {name:"Pompes (genoux si besoin)", svg:"pushup", steps:"Mains largeur épaules · corps gainé · descends poitrine proche du sol · repousse"},
  plank: {name:"Gainage planche", svg:"plank", steps:"Avant-bras au sol, coudes sous les épaules · corps aligné tête-talons · ne pas creuser le dos"},
  mountain: {name:"Mountain climbers", svg:"mountain", steps:"Position de planche · ramène un genou vers la poitrine puis l'autre, rapidement"},
  burpee: {name:"Burpees", svg:"burpee", steps:"Squat · pose les mains, jette les pieds en planche · pompe optionnelle · saute pieds vers les mains · saute en l'air"},
  gainage_lateral: {name:"Gainage latéral", svg:"gainage_lateral", steps:"Sur le côté, appui sur un avant-bras · corps aligné · hanches ne touchent pas le sol"},
  chaise: {name:"Chaise contre le mur", svg:"chaise", steps:"Dos au mur, glisse jusqu'à cuisses à 90° · reste immobile, respire"}
};

const FITNESS_SESSIONS = [
  {level:1, minMin:5, name:"Format court — réveil musculaire", exos:[["squat","1 x 20 sec"],["plank","1 x 25 sec"]]},
  {level:2, minMin:5, name:"Format court — gainage éclair", exos:[["plank","2 x 25 sec"],["mountain","1 x 20 sec"]]},
  {level:3, minMin:5, name:"Format court — punch", exos:[["burpee","1 x 20 sec"],["squat","1 x 30 sec"]]},
  {level:1, minMin:10, name:"Réveil musculaire", exos:[["squat","2 x 20 sec"],["plank","2 x 20 sec"],["pushup","2 x 15 sec"]]},
  {level:1, minMin:20, name:"Bases du corps entier", exos:[["squat","3 x 20 sec"],["lunge","2 x 20 sec / jambe"],["plank","3 x 20 sec"],["pushup","2 x 15 sec"]]},
  {level:2, minMin:20, name:"Renfo bas du corps + gainage", exos:[["squat","3 x 30 sec"],["lunge","3 x 25 sec / jambe"],["pushup","3 x 20 sec"],["plank","3 x 30 sec"],["mountain","3 x 25 sec"]]},
  {level:2, minMin:30, name:"Circuit complet niveau 2", exos:[["squat","4 x 30 sec"],["lunge","3 x 25 sec / jambe"],["pushup","3 x 25 sec"],["gainage_lateral","2 x 25 sec / côté"],["mountain","3 x 30 sec"]]},
  {level:3, minMin:30, name:"Circuit intensif", exos:[["squat","4 x 35 sec"],["lunge","4 x 30 sec / jambe"],["pushup","4 x 30 sec"],["burpee","3 x 25 sec"],["plank","3 x 45 sec"]]},
  {level:3, minMin:45, name:"Corps entier renforcé", exos:[["squat","5 x 35 sec"],["lunge","4 x 30 sec / jambe"],["pushup","4 x 30 sec"],["burpee","4 x 25 sec"],["gainage_lateral","3 x 30 sec / côté"],["mountain","4 x 30 sec"]]},
  {level:4, minMin:30, name:"Haute intensité", exos:[["burpee","5 x 30 sec"],["squat","5 x 40 sec"],["pushup","5 x 35 sec"],["mountain","4 x 35 sec"],["plank","4 x 50 sec"]]},
  {level:4, minMin:60, name:"Séance longue avancée", exos:[["squat","6 x 40 sec"],["lunge","5 x 35 sec / jambe"],["pushup","5 x 35 sec"],["burpee","5 x 30 sec"],["gainage_lateral","4 x 35 sec / côté"],["chaise","3 x 45 sec"]]}
];

const MEALS = {
  dejeuner: [
    {name:"Bowl thaï poulet-cacahuète", ing:["Blanc de poulet","Cacahuètes","Carotte","Sauce soja","Riz","Citron vert"]},
    {name:"Salade taboulé au thon", ing:["Semoule","Thon en boîte","Tomate","Concombre","Persil","Citron"]},
    {name:"Poêlée pois chiches épinards", ing:["Pois chiches","Épinards frais","Ail","Cumin","Huile d'olive"]},
    {name:"Wrap poulet crudités", ing:["Tortilla","Blanc de poulet","Salade","Tomate","Sauce yaourt"]},
    {name:"Buddha bowl saumon", ing:["Pavé de saumon","Quinoa","Avocat","Edamame","Sauce soja"]},
    {name:"Curry de lentilles express", ing:["Lentilles corail","Lait de coco","Curry en poudre","Oignon","Riz"]},
    {name:"Riz sauté légumes-crevettes", ing:["Riz cuit","Crevettes","Petits pois","Carotte","Sauce soja","Œuf"]},
    {name:"Burger maison + frites au four", ing:["Pain burger","Steak haché","Fromage","Pommes de terre","Salade"]}
  ],
  diner: [
    {name:"Papillote de poisson vapeur", ing:["Filet de poisson blanc","Courgette","Citron","Aneth"]},
    {name:"Omelette champignons", ing:["Œufs","Champignons","Persil"]},
    {name:"Soupe miso tofu", ing:["Pâte miso","Tofu","Algue wakamé","Oignon nouveau"]},
    {name:"Poulet grillé haricots verts", ing:["Blanc de poulet","Haricots verts","Ail","Huile d'olive"]},
    {name:"Chili sin carne rapide", ing:["Haricots rouges","Maïs","Tomates concassées","Cumin","Oignon"]},
    {name:"Poke bowl tofu", ing:["Tofu fumé","Riz vinaigré","Edamame","Concombre","Sauce soja"]},
    {name:"Velouté de légumes + œuf mollet", ing:["Légumes de saison","Bouillon","Œufs"]},
    {name:"Pâtes carbonara maison", ing:["Pâtes","Lardons","Œufs","Parmesan","Poivre"]}
  ]
};

/* ---------- État ---------- */
let state = {
  weekPlan: {},
  history: [],
  weighIns: [],
  shoppingChecked: {}
};
let uidCounter = 1;
function uid(){ return 'e' + (uidCounter++) + '_' + Date.now().toString(36); }

let timerState = null; // {dayKey, sportId, mode:'global'|'exo', running, elapsed, exoIndex, exoTimeLeft, intervalId}
let wakeLock = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){ wakeLock = await navigator.wakeLock.request('screen'); }
  }catch(e){ console.warn('Wake Lock indisponible', e); }
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
}
document.addEventListener('visibilitychange', async ()=>{
  if(document.visibilityState==='visible' && timerState && timerState.running){ await requestWakeLock(); }
});

function dayKey(offset){ const d = new Date(); d.setDate(d.getDate()+offset); return d.toISOString().slice(0,10); }
function fmtDate(offset){ const d = new Date(); d.setDate(d.getDate()+offset); return {name: DAY_NAMES[d.getDay()], num: d.getDate(), key: dayKey(offset), isMonday: d.getDay()===1}; }

async function loadState(){
  try{
    const raw = localStorage.getItem('coach-state-v3');
    if(raw) state = JSON.parse(raw);
  }catch(e){ console.warn('Pas de données précédentes trouvées', e); }
}
async function saveState(){
  try{ localStorage.setItem('coach-state-v3', JSON.stringify(state)); }
  catch(e){ console.error('Erreur de sauvegarde', e); }
}

function ensureDay(key){
  if(!state.weekPlan[key]){
    state.weekPlan[key] = {
      sports: [],
      meals: { dejeuner: {mode:null, stars:null, options:null, choice:null}, diner: {mode:null, stars:null, options:null, choice:null}, autre: {mode:null, stars:null} },
      addingSport: false
    };
  }
  return state.weekPlan[key];
}

function pickFitnessSession(duration, level, excludeName){
  let candidates = FITNESS_SESSIONS.filter(s=>s.level===level && s.minMin<=duration);
  if(excludeName) candidates = candidates.filter(s=>s.name!==excludeName);
  candidates.sort((a,b)=>b.minMin-a.minMin);
  if(candidates.length){
    // garde un peu d'aléatoire parmi les plus proches
    const top = candidates.filter(c=>c.minMin===candidates[0].minMin);
    return top[Math.floor(Math.random()*top.length)];
  }
  const all = FITNESS_SESSIONS.filter(s=>s.level===level);
  return all[0] || FITNESS_SESSIONS[0];
}
function currentLevel(){
  const harderVotes = state.history.filter(h=>h.type==='fitness' && h.harder===true).length;
  return Math.min(4, 1 + Math.floor(harderVotes/2));
}
function computeImc(weight){
  if(!weight) return null;
  return (weight / (HEIGHT_M*HEIGHT_M)).toFixed(1);
}
function imcLabel(imc){
  if(imc===null) return '';
  if(imc<18.5) return 'insuffisance pondérale';
  if(imc<25) return 'corpulence normale';
  if(imc<30) return 'surpoids';
  return 'obésité';
}

/* ---------- Rendu ---------- */
function renderBanner(){
  const lastWeigh = state.weighIns[state.weighIns.length-1];
  const imc = lastWeigh ? computeImc(lastWeigh.weight) : null;
  document.getElementById('statWeight').innerHTML = lastWeigh ? `${lastWeigh.weight} <small>kg</small>` : `— <small>kg</small>`;
  document.getElementById('statImc').textContent = imc ? `IMC ${imc} · ${imcLabel(imc)}` : '';

  const weekKeys = [0,1,2,3,4,5,6].map(dayKey);
  let done = 0;
  weekKeys.forEach(k=>{ const p = state.weekPlan[k]; if(p) done += p.sports.filter(s=>s.logged).length; });
  document.getElementById('statSessions').textContent = done;

  let missed = null;
  for(let off=-1; off>=-3; off--){
    const d = new Date(); d.setDate(d.getDate()+off);
    const k = dayKey(off);
    const plan = state.weekPlan[k];
    if(!plan) continue;
    const pendingSport = plan.sports.some(s=>!s.logged);
    const pendingMeal = ['dejeuner','diner'].some(m=>{
      const mp = plan.meals[m];
      return mp.mode==='cook' && mp.choice===null;
    });
    if(pendingSport || pendingMeal){ missed = DAY_NAMES[d.getDay()]; break; }
  }
  document.getElementById('reminderBanner').innerHTML = missed ? `<div class="alert">⚠ ${missed} n'est pas complètement renseigné — mets à jour avant que la semaine avance.</div>` : '';
}

function renderExo(code, reps){
  const exo = EXO_LIB[code];
  return `<div class="exo">${EXO_SVGS[exo.svg]}<div><div class="exo-name">${exo.name}</div><div class="exo-reps">${reps}</div><div class="exo-steps">${exo.steps}</div></div></div>`;
}

function parseSecondsFromReps(reps){
  const m = reps.match(/(\d+)\s*sec/);
  return m ? parseInt(m[1]) : null;
}
function parseSetsFromReps(reps){
  const m = reps.match(/^(\d+)\s*x/);
  return m ? parseInt(m[1]) : 1;
}

function renderSportEntry(dayKeyStr, s){
  let html = `<div class="sport-entry" data-sid="${s.id}" data-key="${dayKeyStr}">`;
  html += `<div class="row"><span class="kind">${SPORT_LABELS[s.kind]}</span>`;
  if(s.duration) html += `<span class="dur">${s.duration} min</span>`;
  html += `</div>`;

  if(s.kind==='tennis' || s.kind==='foot'){
    html += `<div class="status">✓ Déclaré</div>`;
    html += `</div>`; // les activités déclarées après coup n'ont pas plus de détail
    return html;
  }

  if(!s.duration){
    html += `<div class="pill-row">`;
    [5,10,20,30,40,50,60].forEach(d=>{
      html += `<div class="pill durPill" data-key="${dayKeyStr}" data-sid="${s.id}" data-dur="${d}">${d} min</div>`;
    });
    html += `</div></div>`;
    return html;
  }

  if(s.kind==='fitness'){
    if(!s.session) s.session = pickFitnessSession(s.duration, currentLevel());
    const sess = s.session;
    html += `<div class="session-box">
      <div class="title-row"><span class="name">${sess.name}</span><span class="level">Niveau ${sess.level}</span></div>
      ${sess.exos.map(([c,r])=>renderExo(c,r)).join('')}
    </div>`;
    if(!s.logged && !s.timerMode){
      html += `<button class="ghost full changeBtn" data-key="${dayKeyStr}" data-sid="${s.id}">Changer la séance</button>
      <div class="btn-row">
        <button class="primary startGlobalBtn" data-key="${dayKeyStr}" data-sid="${s.id}">▶ Chrono global</button>
        <button class="startExoBtn" data-key="${dayKeyStr}" data-sid="${s.id}">⏱ Minuteur par exercice</button>
      </div>`;
    }
    if(s.timerMode && !s.logged){
      html += renderTimerBox(dayKeyStr, s);
    }
    if(!s.logged && s.timerFinished){
      html += `<div class="small-note">Après la séance</div>
      <div class="scale">${[1,2,3,4,5].map(n=>`<div class="rateBtn ${s.rating===n?'sel':''}" data-key="${dayKeyStr}" data-sid="${s.id}" data-rate="${n}">${n}</div>`).join('')}</div>
      <div class="btn-row">
        <button class="harderBtn" data-key="${dayKeyStr}" data-sid="${s.id}" data-harder="false">Pareil la prochaine fois</button>
        <button class="harderBtn" data-key="${dayKeyStr}" data-sid="${s.id}" data-harder="true">Plus dur la prochaine fois</button>
      </div>`;
    }
    if(s.logged){
      html += `<div class="status">✓ Loggée — ressenti ${s.rating}/5${s.harder?' — plus dur demandé':''}</div>`;
    }
  }

  if(s.kind==='course' || s.kind==='velo'){
    html += `<div class="cardio-inputs">
      <div><label>Distance (km)</label><input type="number" step="0.1" class="cardioInput" data-key="${dayKeyStr}" data-sid="${s.id}" data-field="dist" value="${s.dist||''}" ${s.logged?'disabled':''}></div>
      <div><label>Temps (min)</label><input type="number" class="cardioInput" data-key="${dayKeyStr}" data-sid="${s.id}" data-field="time" value="${s.time||''}" ${s.logged?'disabled':''}></div>
    </div>`;
    if(s.dist && s.time){
      const speed = (s.dist/(s.time/60)).toFixed(1);
      const histSame = state.history.filter(h=>h.type===s.kind);
      const prev = histSame[histSame.length-1];
      html += `<div class="speed-out"><div class="v">${speed} km/h</div><div class="l">Vitesse moyenne</div></div>`;
      if(prev){ const diff=(speed-prev.speed).toFixed(1); html += `<div class="small-note">Vs séance précédente : ${diff>=0?'+':''}${diff} km/h</div>`; }
      if(!s.logged) html += `<button class="ghost full logCardio" data-key="${dayKeyStr}" data-sid="${s.id}">Enregistrer la séance</button>`;
      else html += `<div class="status">✓ Enregistrée</div>`;
    }
  }

  html += `</div>`;
  return html;
}

function renderTimerBox(dayKeyStr, s){
  const t = timerState && timerState.dayKey===dayKeyStr && timerState.sportId===s.id ? timerState : null;
  if(s.timerMode==='global'){
    const elapsed = t ? t.elapsed : (s.elapsedSeconds||0);
    const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
    const ss = String(elapsed%60).padStart(2,'0');
    return `<div class="chrono-box">
      <div class="time">${mm}:${ss}</div>
      <div class="btn-row">
        <button class="${t&&t.running?'':'primary'} toggleGlobalBtn" data-key="${dayKeyStr}" data-sid="${s.id}">${t&&t.running?'⏸ Pause':'▶ Reprendre'}</button>
        <button class="finishGlobalBtn" data-key="${dayKeyStr}" data-sid="${s.id}">Terminer la séance</button>
      </div>
    </div>`;
  } else {
    const exos = s.session.exos;
    const idx = t ? t.exoIndex : (s.exoIndex||0);
    if(idx>=exos.length) return '';
    const [code, reps] = exos[idx];
    const exo = EXO_LIB[code];
    const secTotal = parseSecondsFromReps(reps);
    const timeLeft = t ? t.exoTimeLeft : secTotal;
    return `<div class="chrono-box">
      <div class="cur-exo">Exercice ${idx+1} / ${exos.length}</div>
      <div style="margin:8px 0">${EXO_SVGS[exo.svg]}</div>
      <div class="exo-name" style="font-size:14px">${exo.name} — ${reps}</div>
      ${secTotal ? `<div class="time">${timeLeft}s</div>` : `<div class="small-note">Pas de temps fixe — fais tes séries puis passe à la suite</div>`}
      <div class="btn-row">
        ${secTotal ? `<button class="${t&&t.running?'':'primary'} toggleExoBtn" data-key="${dayKeyStr}" data-sid="${s.id}">${t&&t.running?'⏸ Pause':'▶ Démarrer'}</button>` : ''}
        <button class="nextExoBtn" data-key="${dayKeyStr}" data-sid="${s.id}">${idx===exos.length-1?'Terminer la séance':'Exercice suivant'}</button>
      </div>
    </div>`;
  }
}

function pickMealOptions(mealType){
  const pool = [...MEALS[mealType]];
  const chosen = [];
  while(chosen.length<3 && pool.length){ const i=Math.floor(Math.random()*pool.length); chosen.push(pool.splice(i,1)[0]); }
  const starsSet = [5,3,2];
  return chosen.map((m,i)=>({...m, stars:starsSet[i]}));
}

function renderMealBlock(dayKeyStr, mealKey, label, starsOnly){
  const plan = ensureDay(dayKeyStr);
  const mp = plan.meals[mealKey];
  let html = `<div class="meal-block">`;
  html += `<div class="head"><span class="name">${label}</span></div>`;

  if(mp.mode===null){
    if(starsOnly){ mp.mode = 'stars'; }
    else{
      html += `<div class="meal-mode-btns">
        <button class="starsModeBtn" data-key="${dayKeyStr}" data-meal="${mealKey}">⭐ Noter directement</button>
        <button class="cookModeBtn" data-key="${dayKeyStr}" data-meal="${mealKey}">🍳 Cuisiner</button>
      </div>`;
    }
  }
  if(mp.mode==='stars'){
    if(mp.stars===null){
      html += `<div class="small-note">Qualité diététique</div>
      <div class="stars">${[1,2,3,4,5].map(n=>`<span class="starPick ${mp.stars>=n?'on':''}" data-key="${dayKeyStr}" data-meal="${mealKey}" data-n="${n}">★</span>`).join('')}</div>`;
    } else {
      html += `<div class="done-tag">✓ Noté <span style="color:var(--ball)">${'★'.repeat(mp.stars)}${'☆'.repeat(5-mp.stars)}</span></div>`;
    }
  } else if(mp.mode==='cook'){
    if(mp.stars===null){
      html += `<div class="small-note">Qualité diététique de ce repas</div>
      <div class="stars">${[1,2,3,4,5].map(n=>`<span class="starPick ${mp.stars>=n?'on':''}" data-key="${dayKeyStr}" data-meal="${mealKey}" data-n="${n}">★</span>`).join('')}</div>`;
    } else {
      html += `<div class="done-tag">✓ Noté <span style="color:var(--ball)">${'★'.repeat(mp.stars)}${'☆'.repeat(5-mp.stars)}</span></div>`;
    }
  } else if(mp.mode==='cook'){
    if(!mp.options) mp.options = pickMealOptions(mealKey);
    if(mp.choice===null){
      html += `<div class="small-note">Choisis une recette</div><div class="meal-opts">`;
      mp.options.forEach((o,i)=>{
        html += `<div class="meal-opt" data-key="${dayKeyStr}" data-meal="${mealKey}" data-idx="${i}">
          <span class="name">${o.name}</span><span class="stars-disp">${'★'.repeat(o.stars)}${'☆'.repeat(5-o.stars)}</span>
        </div>`;
      });
      html += `</div>`;
    } else {
      const chosen = mp.options[mp.choice];
      html += `<div class="done-tag">✓ ${chosen.name} <span style="color:var(--ball)">${'★'.repeat(chosen.stars)}${'☆'.repeat(5-chosen.stars)}</span></div>`;
    }
  }
  html += `</div>`;
  return html;
}

function renderDay(offset){
  const {name, num, key, isMonday} = fmtDate(offset);
  const plan = ensureDay(key);

  let html = `<div class="day" data-key="${key}">`;
  html += `<div class="day-head"><span class="day-name">${name} ${num}</span>`;
  if(isMonday) html += `<span class="badge badge-weigh">Pesée</span>`;
  html += `</div>`;

  if(isMonday){
    const already = state.weighIns.find(w=>w.date===key);
    html += `<div class="weigh-inputs">
      <div><label>Poids (kg)</label><input type="number" step="0.1" class="weighInput" data-key="${key}" data-field="weight" value="${already?already.weight:''}" placeholder="72.5"></div>
      <div><label>Tour de ventre — optionnel (cm)</label><input type="number" class="weighInput" data-key="${key}" data-field="waist" value="${already?already.waist||'':''}" placeholder="88"></div>
    </div>`;
    if(already && already.weight){ const imc = computeImc(already.weight); html += `<div class="imc-tag">IMC ${imc} · ${imcLabel(imc)}</div>`; }
  }

  html += `<div class="block-title">Sport</div>`;
  plan.sports.forEach(s=>{ html += renderSportEntry(key, s); });
  if(!plan.addingSport){
    html += `<button class="add-sport-btn" data-key="${key}">+ Ajouter une séance</button>`;
  } else {
    html += `<div class="add-picker">
      <div class="pill" data-key="${key}" data-addkind="fitness">Fitness</div>
      <div class="pill" data-key="${key}" data-addkind="course">Course</div>
      <div class="pill" data-key="${key}" data-addkind="velo">Vélo</div>
      <div class="pill" data-key="${key}" data-addkind="tennis">Tennis fait</div>
      <div class="pill" data-key="${key}" data-addkind="foot">Foot fait</div>
    </div>`;
  }

  html += `<div class="block-title">Repas</div>`;
  html += renderMealBlock(key, 'dejeuner', 'Déjeuner', false);
  html += renderMealBlock(key, 'diner', 'Dîner', false);
  html += renderMealBlock(key, 'autre', 'Autre (collation, goûter...)', true);

  html += `</div>`;
  return html;
}

function renderAgenda(){
  document.getElementById('weekLabel').textContent = new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'long'});
  let html = '';
  for(let i=-3;i<7;i++) html += renderDay(i);
  document.getElementById('view-agenda').innerHTML = html;
}

function renderCourses(){
  const items = {};
  Object.values(state.weekPlan).forEach(plan=>{
    ['dejeuner','diner'].forEach(m=>{
      const mp = plan.meals[m];
      if(mp.mode==='cook' && mp.choice!==null && mp.options){ mp.options[mp.choice].ing.forEach(ing=>{ items[ing]=true; }); }
    });
  });
  const list = Object.keys(items).sort();
  const el = document.getElementById('view-courses');
  if(!list.length){ el.innerHTML = `<div class="card"><div class="empty">Choisis "Cuisiner" sur un repas dans l'agenda pour remplir ta liste de courses.</div></div>`; return; }
  let html = `<div class="card"><h3>Liste de courses de la semaine</h3>`;
  list.forEach(ing=>{
    const checked = state.shoppingChecked[ing];
    html += `<div class="shop-item"><label style="display:flex;gap:8px;align-items:center;width:100%;cursor:pointer">
      <input type="checkbox" class="shopCheck" data-item="${ing}" ${checked?'checked':''}>
      <span style="${checked?'text-decoration:line-through;color:var(--muted)':''}">${ing}</span>
    </label></div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function weekAvgStars(weekPlan){
  const stars = [];
  Object.values(weekPlan).forEach(day=>{
    ['dejeuner','diner','autre'].forEach(m=>{
      const mp = day.meals[m];
      if(mp.mode==='stars' && mp.stars!==null) stars.push(mp.stars);
      if(mp.mode==='cook' && mp.choice!==null) stars.push(mp.options[mp.choice].stars);
    });
  });
  return stars.length ? (stars.reduce((a,b)=>a+b,0)/stars.length) : null;
}

function renderSuivi(){
  const el = document.getElementById('view-suivi');
  if(!state.weighIns.length){ el.innerHTML = `<div class="card"><div class="empty">Ta première pesée du lundi apparaîtra ici, avec la courbe d'évolution et ton IMC.</div></div>`; return; }
  let html = `<div class="card"><h3>Évolution du poids</h3><div class="chart-wrap"><canvas id="weightChart"></canvas></div></div>`;

  if(state.weighIns.length>=2){
    const weeks = [];
    for(let i=1;i<state.weighIns.length;i++){
      const prev = state.weighIns[i-1], cur = state.weighIns[i];
      const sessionsInWeek = state.history.filter(h=>h.date>prev.date && h.date<=cur.date).length;
      weeks.push({delta: cur.weight-prev.weight, sessions: sessionsInWeek});
    }
    const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b.delta,0)/arr.length).toFixed(2) : null;
    const withSport = weeks.filter(w=>w.sessions>=3);
    const withoutSport = weeks.filter(w=>w.sessions<3);
    const avgStars = weekAvgStars(state.weekPlan);
    html += `<div class="card"><h3>Séances, repas &amp; poids</h3>`;
    if(weeks.length<3){ html += `<div class="empty">Encore un peu tôt pour une vraie analyse — reviens dans quelques semaines.</div>`; }
    else {
      html += `<div class="hist-row"><span>Semaines à 3 séances ou plus</span><span>${avg(withSport)!==null?avg(withSport)+' kg en moyenne':'pas assez de données'}</span></div>`;
      html += `<div class="hist-row"><span>Semaines à moins de 3 séances</span><span>${avg(withoutSport)!==null?avg(withoutSport)+' kg en moyenne':'pas assez de données'}</span></div>`;
    }
    if(avgStars!==null) html += `<div class="hist-row"><span>Moyenne étoiles repas (semaine en cours)</span><span>${avgStars.toFixed(1)} / 5</span></div>`;
    html += `</div>`;
  }
  el.innerHTML = html;

  new Chart(document.getElementById('weightChart'), {
    type:'line',
    data:{ labels: state.weighIns.map(w=>new Date(w.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})),
      datasets:[{label:'Poids (kg)', data: state.weighIns.map(w=>w.weight), borderColor:'#0F6E56', backgroundColor:'rgba(15,110,86,0.1)', tension:0.3, fill:true}] },
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{ticks:{color:'#6B7A72'}}, x:{ticks:{color:'#6B7A72'}}}}
  });
}

function renderHistorique(){
  const el = document.getElementById('view-historique');
  if(!state.history.length){ el.innerHTML = `<div class="card"><div class="empty">Tes séances loggées apparaîtront ici.</div></div>`; return; }
  let html = `<div class="card"><h3>Séances loggées</h3>`;
  [...state.history].reverse().forEach(h=>{
    const d = new Date(h.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
    let detail = '';
    if(h.type==='fitness') detail = `${h.name} — ressenti ${h.rating}/5${h.harder?' — plus dur demandé':''}`;
    else if(h.type==='course'||h.type==='velo') detail = `${h.dist} km en ${h.time} min — ${h.speed} km/h`;
    else detail = `déclaré`;
    html += `<div class="hist-row"><span>${d} · ${SPORT_LABELS[h.type]||h.type}</span><span>${detail}</span></div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function renderAll(){ renderBanner(); renderAgenda(); renderCourses(); renderSuivi(); renderHistorique(); attachHandlers(); }

/* ---------- Chrono ---------- */
function stopAnyTimer(){
  if(timerState && timerState.intervalId){ clearInterval(timerState.intervalId); }
  timerState = null;
}
function startGlobalTimer(key, sid){
  const plan = ensureDay(key); const s = plan.sports.find(x=>x.id===sid);
  s.timerMode = 'global';
  stopAnyTimer();
  requestWakeLock();
  timerState = {dayKey:key, sportId:sid, mode:'global', running:true, elapsed:s.elapsedSeconds||0};
  timerState.intervalId = setInterval(()=>{ timerState.elapsed++; s.elapsedSeconds = timerState.elapsed; refreshTimerDisplay(); }, 1000);
  renderAll();
}
function toggleGlobalTimer(key, sid){
  if(timerState && timerState.running){ clearInterval(timerState.intervalId); timerState.running=false; timerState.intervalId=null; releaseWakeLock(); renderAll(); }
  else if(timerState){ timerState.running=true; requestWakeLock(); timerState.intervalId = setInterval(()=>{ timerState.elapsed++; const plan=ensureDay(key); const s=plan.sports.find(x=>x.id===sid); s.elapsedSeconds=timerState.elapsed; refreshTimerDisplay(); },1000); renderAll(); }
}
function finishGlobalTimer(key, sid){
  const plan = ensureDay(key); const s = plan.sports.find(x=>x.id===sid);
  s.duration = Math.max(1, Math.round((s.elapsedSeconds||0)/60));
  s.timerFinished = true;
  releaseWakeLock();
  stopAnyTimer(); saveState(); renderAll();
}
function startExoTimer(key, sid){
  const plan = ensureDay(key); const s = plan.sports.find(x=>x.id===sid);
  s.timerMode = 'exo'; s.exoIndex = 0;
  stopAnyTimer();
  requestWakeLock();
  const secs = parseSecondsFromReps(s.session.exos[0][1]);
  timerState = {dayKey:key, sportId:sid, mode:'exo', running:false, exoIndex:0, exoTimeLeft:secs};
  renderAll();
}
function toggleExoTimer(key, sid){
  if(!timerState) return;
  if(timerState.running){ clearInterval(timerState.intervalId); timerState.running=false; timerState.intervalId=null; releaseWakeLock(); }
  else {
    timerState.running = true;
    requestWakeLock();
    timerState.intervalId = setInterval(()=>{
      if(timerState.exoTimeLeft>0){ timerState.exoTimeLeft--; refreshTimerDisplay(); }
      else { clearInterval(timerState.intervalId); timerState.running=false; nextExo(key, sid); }
    }, 1000);
  }
  renderAll();
}
function nextExo(key, sid){
  const plan = ensureDay(key); const s = plan.sports.find(x=>x.id===sid);
  if(timerState && timerState.intervalId) clearInterval(timerState.intervalId);
  const nextIdx = (timerState?timerState.exoIndex:s.exoIndex) + 1;
  s.exoIndex = nextIdx;
  if(nextIdx >= s.session.exos.length){
    s.timerFinished = true; releaseWakeLock(); stopAnyTimer(); saveState(); renderAll(); return;
  }
  const secs = parseSecondsFromReps(s.session.exos[nextIdx][1]);
  timerState = {dayKey:key, sportId:sid, mode:'exo', running:false, exoIndex:nextIdx, exoTimeLeft:secs};
  saveState(); renderAll();
}
function refreshTimerDisplay(){
  // met à jour uniquement le chrono visible pour éviter de perdre le focus des inputs
  const box = document.querySelector('.chrono-box .time');
  if(!box || !timerState) return;
  if(timerState.mode==='global'){
    const mm = String(Math.floor(timerState.elapsed/60)).padStart(2,'0');
    const ss = String(timerState.elapsed%60).padStart(2,'0');
    box.textContent = `${mm}:${ss}`;
  } else {
    box.textContent = `${timerState.exoTimeLeft}s`;
  }
}

/* ---------- Handlers ---------- */
function attachHandlers(){
  document.querySelectorAll('.weighInput').forEach(el=>{
    el.onchange = ()=>{
      const key = el.dataset.key;
      let entry = state.weighIns.find(w=>w.date===key);
      if(!entry){ entry = {date:key, weight:null, waist:null}; state.weighIns.push(entry); state.weighIns.sort((a,b)=>a.date.localeCompare(b.date)); }
      entry[el.dataset.field] = parseFloat(el.value)||null;
      saveState(); renderAll();
    };
  });

  document.querySelectorAll('.add-sport-btn').forEach(el=>{
    el.onclick = ()=>{ ensureDay(el.dataset.key).addingSport = true; renderAll(); };
  });
  document.querySelectorAll('.add-picker .pill').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      const kind = el.dataset.addkind;
      const entry = {id:uid(), kind, duration:null, logged:false};
      if(kind==='tennis' || kind==='foot'){
        entry.logged = true;
        state.history.push({date:el.dataset.key, type:kind});
      }
      plan.sports.push(entry);
      plan.addingSport = false;
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.durPill').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      const s = plan.sports.find(x=>x.id===el.dataset.sid);
      s.duration = parseInt(el.dataset.dur);
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.changeBtn').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key);
      const s = plan.sports.find(x=>x.id===el.dataset.sid);
      s.session = pickFitnessSession(s.duration, currentLevel(), s.session?s.session.name:null);
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.startGlobalBtn').forEach(el=>{ el.onclick = ()=> startGlobalTimer(el.dataset.key, el.dataset.sid); });
  document.querySelectorAll('.startExoBtn').forEach(el=>{ el.onclick = ()=> startExoTimer(el.dataset.key, el.dataset.sid); });
  document.querySelectorAll('.toggleGlobalBtn').forEach(el=>{ el.onclick = ()=> toggleGlobalTimer(el.dataset.key, el.dataset.sid); });
  document.querySelectorAll('.finishGlobalBtn').forEach(el=>{ el.onclick = ()=> finishGlobalTimer(el.dataset.key, el.dataset.sid); });
  document.querySelectorAll('.toggleExoBtn').forEach(el=>{ el.onclick = ()=> toggleExoTimer(el.dataset.key, el.dataset.sid); });
  document.querySelectorAll('.nextExoBtn').forEach(el=>{ el.onclick = ()=> nextExo(el.dataset.key, el.dataset.sid); });

  document.querySelectorAll('.rateBtn').forEach(el=>{
    el.onclick = ()=>{ const plan=ensureDay(el.dataset.key); const s=plan.sports.find(x=>x.id===el.dataset.sid); s.rating=parseInt(el.dataset.rate); saveState(); renderAll(); };
  });
  document.querySelectorAll('.harderBtn').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key); const s = plan.sports.find(x=>x.id===el.dataset.sid);
      s.harder = el.dataset.harder==='true'; s.logged = true;
      state.history.push({date:el.dataset.key, type:'fitness', name:s.session.name, rating:s.rating, harder:s.harder});
      saveState(); renderAll();
    };
  });
  document.querySelectorAll('.cardioInput').forEach(el=>{
    el.oninput = ()=>{ const plan=ensureDay(el.dataset.key); const s=plan.sports.find(x=>x.id===el.dataset.sid); s[el.dataset.field]=parseFloat(el.value)||null; saveState(); renderAll(); };
  });
  document.querySelectorAll('.logCardio').forEach(el=>{
    el.onclick = ()=>{
      const plan = ensureDay(el.dataset.key); const s = plan.sports.find(x=>x.id===el.dataset.sid);
      const speed = +(s.dist/(s.time/60)).toFixed(1);
      s.logged = true; s.speed = speed;
      state.history.push({date:el.dataset.key, type:s.kind, dist:s.dist, time:s.time, speed});
      saveState(); renderAll();
    };
  });

  document.querySelectorAll('.starsModeBtn').forEach(el=>{ el.onclick=()=>{ ensureDay(el.dataset.key).meals[el.dataset.meal].mode='stars'; saveState(); renderAll(); }; });
  document.querySelectorAll('.cookModeBtn').forEach(el=>{ el.onclick=()=>{ ensureDay(el.dataset.key).meals[el.dataset.meal].mode='cook'; saveState(); renderAll(); }; });
  document.querySelectorAll('.starPick').forEach(el=>{ el.onclick=()=>{ ensureDay(el.dataset.key).meals[el.dataset.meal].stars=parseInt(el.dataset.n); saveState(); renderAll(); }; });
  document.querySelectorAll('.meal-opt').forEach(el=>{ el.onclick=()=>{ ensureDay(el.dataset.key).meals[el.dataset.meal].choice=parseInt(el.dataset.idx); saveState(); renderAll(); }; });

  document.querySelectorAll('.shopCheck').forEach(el=>{ el.onchange=()=>{ state.shoppingChecked[el.dataset.item]=el.checked; saveState(); renderCourses(); }; });

  document.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('view-'+el.dataset.tab).classList.add('active');
    };
  });
}

(async function init(){ await loadState(); renderAll(); })();
</script>
</body>
</html>
